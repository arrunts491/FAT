apiVersion: apps/v1
kind: Deployment
metadata:
  name: fat
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fat
  template:
    metadata:
      labels:
        app: fat
    spec:
      containers:
      - name: fat
        image: arrun369/fat:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: fat-service
spec:
  type: NodePort
  selector:
    app: fat
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30020
