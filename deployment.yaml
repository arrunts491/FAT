apiVersion: apps/v1
kind: Deployment
metadata:
  name: FAT
spec:
  replicas: 2
  selector:
    matchLabels:
      app: FAT
  template:
    metadata:
      labels:
        app: FAT
    spec:
      containers:
      - name: FAT
        image: arrun369/FAT:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: FAT-service
spec:
  type: NodePort
  selector:
    app: FAT
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30020
